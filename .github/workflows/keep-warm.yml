# Neo4j Aura Free pauses after 3 idle days, and a paused instance can only be
# resumed from the Aura console — no driver/API call wakes it. So instead of a
# wake-up, this pings /api/warm (which runs `RETURN 1` against Aura) once a day
# to keep the instance from ever idling. Daily is plenty for a 3-day window, so
# GitHub's cron throttling doesn't matter here (unlike digitalthread's Render
# 15-minute sleep). GitHub disables the schedule after 60 days without repo
# activity — re-enable from the Actions tab if the demo goes cold.
name: keep-warm
on:
  schedule:
    - cron: "17 9 * * *" # off-peak minute; GitHub delays :00 crons the most
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: curl -sf -m 60 --retry 3 --retry-all-errors https://pharma-supply-chain-graph-y1am.vercel.app/api/warm
